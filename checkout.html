<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ऑर्डर कन्फर्म करें | स्वाद रेस्टोरेंट</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #fef9f2; padding: 20px; }
        .container { max-width: 800px; margin: 30px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #d35400; text-align: center; margin-bottom: 20px; }
        .order-summary { background: #fdf2e9; padding: 15px; border-radius: 15px; margin-bottom: 30px; }
        .order-summary h3 { margin-bottom: 10px; color: #a04000; }
        .order-items { list-style: none; }
        .order-items li { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #e67e22; }
        .total { font-weight: bold; font-size: 1.3rem; margin-top: 10px; text-align: right; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: 600; color: #2c3e50; display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 12px 15px; border: 2px solid #f1c40f; border-radius: 30px; font-size: 1rem; background: #fff; }
        input:focus, textarea:focus { outline: none; border-color: #d35400; }
        .btn-submit { background: #27ae60; color: white; border: none; padding: 15px 30px; font-size: 1.2rem; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; margin-top: 10px; }
        .btn-submit:hover { background: #219a52; }
        .error { color: #e74c3c; font-size: 0.9rem; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📝 डिलीवरी जानकारी भरें</h2>
        
        <div class="order-summary" id="orderSummary">
            <!-- यहां JavaScript से कार्ट दिखेगा -->
        </div>

        <form id="orderForm" action="save_order.php" method="POST">
            <input type="hidden" name="cart_data" id="cartDataInput">
            
            <div class="form-group">
                <label>👤 पूरा नाम</label>
                <input type="text" name="customer_name" id="name" placeholder="जैसे: राहुल शर्मा" required>
            </div>
            <div class="form-group">
                <label>📞 मोबाइल नंबर</label>
                <input type="tel" name="customer_phone" id="phone" pattern="[0-9]{10}" placeholder="10 अंकों का नंबर" required>
            </div>
            <div class="form-group">
                <label>📍 डिलीवरी पता</label>
                <textarea name="customer_address" id="address" rows="3" placeholder="पूरा पता, लैंडमार्क सहित" required></textarea>
            </div>
            <div class="form-group">
                <label>💬 कोई खास निर्देश (वैकल्पिक)</label>
                <textarea name="special_instructions" id="instructions" rows="2" placeholder="जैसे: मिर्च कम, बिना प्याज..."></textarea>
            </div>
            
            <button type="submit" class="btn-submit">✅ ऑर्डर प्लेस करें</button>
        </form>
        <p style="text-align: center; margin-top: 15px; color: #7f8c8d;">ऑर्डर करने के बाद आपको कन्फर्मेशन कॉल आएगा।</p>
    </div>

    <script>
        // URL से कार्ट डेटा पढ़ें
        const urlParams = new URLSearchParams(window.location.search);
        const cartParam = urlParams.get('cart');
        
        if (cartParam) {
            try {
                const cart = JSON.parse(decodeURIComponent(cartParam));
                displaySummary(cart);
                // हिडन इनपुट में कार्ट डेटा सेट करें
                document.getElementById('cartDataInput').value = JSON.stringify(cart);
            } catch (e) {
                alert('ऑर्डर डेटा पढ़ने में त्रुटि। कृपया मेनू से दोबारा चुनें।');
                window.location.href = 'restaurant.html';
            }
        } else {
            alert('कोई कार्ट डेटा नहीं मिला।');
            window.location.href = 'restaurant.html';
        }

        function displaySummary(cart) {
            const summaryDiv = document.getElementById('orderSummary');
            let html = '<h3>🛒 आपका ऑर्डर</h3><ul class="order-items">';
            let total = 0;
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                html += `<li><span>${item.name} (x${item.quantity})</span><span>₹${itemTotal}</span></li>`;
                total += itemTotal;
            });
            html += `</ul><div class="total">कुल राशि: ₹${total}</div>`;
            summaryDiv.innerHTML = html;
        }
    </script>
</body>
</html>
